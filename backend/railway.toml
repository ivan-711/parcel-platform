[build]
builder = "nixpacks"

[deploy]
# Railway must set "Root Directory" to "backend" in the service settings.
# Without this, cwd is the repo root and alembic/uvicorn can't find their config.
startCommand = "bash scripts/migrate.sh && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
